<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Log in to your JAE HQ account.">
    <title>Log In | JAE HQ</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="auth-layout">
        <section class="auth-brand-panel">
            <a href="index.html" class="brand" style="color:white;">
                <span class="brand-symbol">🦋</span>
                <span class="brand-copy"><strong>JAE HQ</strong><small style="color:rgba(255,255,255,.7)">Creative technology, by Katie.</small></span>
            </a>
            <div>
                <span class="eyebrow" style="color:#b7dfe5">Member access</span>
                <h1>Welcome back.</h1>
                <p>Your account now uses Firebase as the single source of truth for sign-in state.</p>
            </div>
        </section>

        <section class="auth-form-panel">
            <div class="auth-form-wrap">
                <h2>Log in</h2>
                <p class="auth-subtext">Reconnect to your JAE HQ account.</p>

                <form class="form" onsubmit="event.preventDefault(); login();">
                    <div class="field">
                        <label for="loginEmail">Email address</label>
                        <input id="loginEmail" type="email" autocomplete="email" required>
                    </div>
                    <div class="field">
                        <label for="loginPassword">Password</label>
                        <input id="loginPassword" type="password" autocomplete="current-password" required>
                    </div>
                    <div id="formMessage" class="form-message" aria-live="polite"></div>
                    <button id="loginButton" class="button gradient" type="submit">Log in</button>
                    <button class="button secondary" type="button" onclick="resetPassword()">Reset password</button>
                </form>

                <p class="form-footer">New here? <a href="signup.html">Create a JAE HQ account</a>.</p>
            </div>
        </section>
    </main>
    <script type="module" src="js/auth.js"></script>
</body>
</html>

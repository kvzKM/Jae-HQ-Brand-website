<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Create a JAE HQ member account.">
    <title>Create Account | JAE HQ</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="auth-layout">
        <section class="auth-brand-panel">
            <a href="index.html" class="brand" style="color:white;">
                <span class="brand-symbol">🦋</span>
                <span class="brand-copy"><strong>JAE HQ</strong><small style="color:rgba(255,255,255,.7)">Creative technology, by Katie.</small></span>
            </a>
            <div>
                <span class="eyebrow" style="color:#b7dfe5">Join JAE HQ</span>
                <h1>Make yourself at home.</h1>
                <p>A softer member identity system, with the butterfly still where it belongs.</p>
            </div>
        </section>

        <section class="auth-form-panel">
            <div class="auth-form-wrap">
                <h2>Create account</h2>
                <p class="auth-subtext">Choose a username, an identity icon and your login details.</p>

                <form class="form" onsubmit="event.preventDefault(); signup();">
                    <div class="field">
                        <label for="signupUsername">Username</label>
                        <input id="signupUsername" type="text" minlength="2" maxlength="30" autocomplete="username" required>
                    </div>
                    <div class="field">
                        <label for="signupEmail">Email address</label>
                        <input id="signupEmail" type="email" autocomplete="email" required>
                    </div>
                    <div class="field">
                        <label for="signupPassword">Password</label>
                        <input id="signupPassword" type="password" minlength="6" autocomplete="new-password" required>
                    </div>

                    <div class="field">
                        <label>Choose your identity</label>
                        <div class="emoji-picker" aria-label="Profile identity">
                            <button class="emoji-option" type="button" data-emoji="🦋" onclick="selectEmoji('🦋')">🦋</button>
                            <button class="emoji-option" type="button" data-emoji="🌸" onclick="selectEmoji('🌸')">🌸</button>
                            <button class="emoji-option" type="button" data-emoji="🌙" onclick="selectEmoji('🌙')">🌙</button>
                            <button class="emoji-option" type="button" data-emoji="⭐" onclick="selectEmoji('⭐')">⭐</button>
                            <button class="emoji-option" type="button" data-emoji="🧸" onclick="selectEmoji('🧸')">🧸</button>
                            <button class="emoji-option" type="button" data-emoji="☁️" onclick="selectEmoji('☁️')">☁️</button>
                            <button class="emoji-option" type="button" data-emoji="🍄" onclick="selectEmoji('🍄')">🍄</button>
                            <button class="emoji-option" type="button" data-emoji="🐇" onclick="selectEmoji('🐇')">🐇</button>
                        </div>
                        <div id="selectedEmoji" class="form-message">Selected identity: 🦋</div>
                    </div>

                    <div id="formMessage" class="form-message" aria-live="polite"></div>
                    <button id="signupButton" class="button gradient" type="submit">Create account</button>
                </form>

                <p class="form-footer">Already connected? <a href="login.html">Log in</a>.</p>
            </div>
        </section>
    </main>
    <script type="module" src="js/auth.js"></script>
</body>
</html>

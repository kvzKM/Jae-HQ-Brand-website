import { db } from "./firebase.js";import { collection,getDocs,query,where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const grid=document.getElementById("travelGrid"),clean=v=>String(v??"").trim(),esc=v=>clean(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");function safe(v){try{const u=new URL(clean(v),location.origin);return ["http:","https:"].includes(u.protocol)?u.href:""}catch{return ""}}
async function load(){try{const s=await getDocs(query(collection(db,"travel"),where("status","==","published"))),items=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>Number(!!b.featured)-Number(!!a.featured));if(!items.length){grid.innerHTML='<div class="empty-state" style="grid-column:1/-1">No published travel entries yet.</div>';return}grid.innerHTML=items.map(x=>{const img=safe(x.image);return `<article class="public-content-card">${img?`<img src="${esc(img)}" alt="${esc(x.title)}" loading="lazy">`:'<div class="content-image-placeholder">⌖</div>'}<div class="public-content-card-body"><div class="meta">${esc(x.location||"Travel")}${x.featured?" · Featured":""}</div><h3>${esc(x.title)}</h3><p>${esc(x.description||"")}</p></div></article>`}).join("")}catch(e){console.error(e);grid.innerHTML='<div class="empty-state" style="grid-column:1/-1">Travel content is temporarily unavailable.</div>'}}load();
